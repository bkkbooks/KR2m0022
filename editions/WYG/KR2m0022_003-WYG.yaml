body:
  text: 諡法卷三宋蘇洵撰英一出類抜萃曰英新改舊法曰徳正應和曰英又曰道徳應物曰英左傳有徳正應和曰莫英莫字相類盖誤耳道徳應物盖後人因誤所為之也詩曰彼其之子美如英毛彦云萬人為英行英者有大過之詞也故取孟子論孔子出乎其類拔乎其萃以充之睿一可以作聖曰睿新改舊法曰家方蓋平曰睿衞有睿聖武公而見於諡法者惟此諡法有衆方益平曰儆衆似家益似蓋但不知儆何由為睿耳家方蓋平於睿義亦不通睿者可以為聖而謂之聖則不可洪範有貌言視聽思此五者人莫不有人莫不有者性也恭從明聰睿此五者聖賢則有之聖賢而後有者才也肅乂哲謀聖此五者各因其才而至焉徳之大成也故曰可以作聖曰睿博一多聞强識曰博憲三賞善罰惡曰憲博聞多能曰憲行善可記曰憲記曰凡養老五帝憲三王有乞言憲者記其善言以為法也世一承命不遷曰世不遷則能久久行世軍一治典不殺曰軍治其師旅之法使天下畏而不敢為亂以至於不殺者是古者為軍之本意堅一磨而不磷曰堅䟆一意深慮遠曰䟆䟆者取其警而後行深慎之稱也䟆或作畢孝六慈惠愛親曰孝劉熙曰以已所慈所惠之心推以事親孝之至也能養能恭曰孝新補子夏問孝子曰色難有事弟子服其勞有酒食先生饌曽是以為孝乎子游問孝子曰今之孝者是謂能養至於犬馬皆能有養不敬何以别乎繼志成事曰孝孔子曰武王周公其達孝矣乎夫孝也者善繼人之志善述人之事者也協時肇享曰孝幹蠱用譽曰孝新補易曰幹父之蠱用譽象曰幹父用譽意承考也以意承之而已其事有不可者亦不從也秉徳不回曰孝人有孝於其親而秉徳不回以陷於患難不終其養者世以為不孝君子閔之曰是亦孝也故記以戰陣無勇為非孝何者恐以不義辱親也晉周處與賊戰而死有老母在賀循諡之曰孝君子韙之然而人必先有孝徳也而後秉徳不回乃得為孝如徒曰秉徳不回者是為貞也非孝也忠四盛襄純固曰忠臨患不忘國曰忠推賢盡誠曰忠㢘公方正曰忠惠一愛民好與曰惠孔子以子産為惠人而孟子亦譏其惠而不知為政然則惠者結愛於人而不知禮者也仁六蓄義豐功曰仁孔子重以仁與人然其取於人以為仁者甚廣商之三仁去就死生不齊而皆得為仁則仁之為義廣矣故其蓄義豐功於前而引其别於後盖亦不能徧舉也慈民愛物曰仁新補克已復禮曰仁顔淵問仁子曰克已復禮為仁請問其目子曰非禮勿視非禮勿聴非禮勿言非禮勿動貴賢親親曰仁殺身成人曰仁能以國讓曰仁智六尊明勝患曰智鄭大夫叔詹曰尊明勝患智也殺身贖國忠也言尊有明徳者以勝患也黙行言當曰智摧芒折㢘曰智臨事不惑曰智察言知人曰智擇任而往曰智慎二敏以敬曰慎沈静寡言曰慎禮二奉義順則曰禮恭儉莊敬曰禮義五制事合宜曰義見利能終曰義新補易曰知至至之可與㡬也知終終之可與存義也王弼曰通物之始者義不若利成物之終者利不若義然則所貴乎義者取其不役於利而有所重為也除去天地之害曰義先君後已曰義新補孟子曰未有仁而遺其親者也未有義而後其君者也取而不貪曰義周二行歸忠信曰周詩曰行歸于周萬民所望周忠信也事君不黨曰周敏一應事有功曰敏信二守命共時曰信鄭太子華言於齊桓欲以鄭為内臣訪於管仲管仲曰父子不奸之謂禮守命共時之謂信乃不許子華由是得罪於鄭出言可復曰信有子曰信近於義言可復也達二質直而好義曰達子張問如之何斯可謂之達者曰在家必聞在邦必聞子曰是聞也非達也夫達也者質直而好義察言而觀色慮以下人在邦必達在家必達夫聞也者色取仁而行違居之不疑在邦必聞在家必聞疏通中理曰達寛一含光得衆曰寛理一才理審諦曰理凱一中心樂易曰凱清一避遠不義曰清新改伯夷與其鄉人立其冠不正望望然去之而孟子以為清故云直二治亂守正曰直新改孔子曰直哉史魚邦有道如矢邦無道如矢君子哉蘧伯玉邦有道則仕邦無道則可卷而懷之盖以史魚為過矣不隠其親曰直新改叔向議獄而尸其弟叔魚孔子曰叔向古之遺直也治國制刑不隠於親曰義也夫盖亦以為過矣欽一敬事節用曰欽益二遷善改過曰益易益之象曰君子以見善則遷有過則改取於人以為善曰益新改孟子之稱舜曰自耕稼陶漁以有天下莫非取於人者取人以為善是與人為善也孔子曰益者三友損者三友友直友諒友多聞益矣友便辟友善柔友便佞損矣又曰益者三樂損者三樂樂節禮樂樂道人之善樂多賢友益矣樂驕樂樂佚遊樂宴樂損矣凡所謂益者皆取於人以為善之謂也良一小心敬事曰良度一心能制義曰度左傳成鱄云見明注類一勤施無私曰類基一徳性温恭曰基詩曰温温恭人惟徳之基慈一視民如子曰慈鼎一追改前過曰鼎易曰革去故鼎取新齊二執正克莊曰齊輕輶恭就曰齊劉熙曰輶亦輕行輕恭以就事速疾使功齊等故曰齊深一秉心塞淵曰深温一徳性寛和曰温讓一推功尚善曰讓宻一追補前過曰宻諡法卷三欽定四庫全書諡法卷四宋蘇洵撰莫一徳正應和曰莫莫然和靖之稱也左傳成鱄云見明註介一執一不遷曰介新改厚一强毅敦樸曰厚新改純一中正精粹曰純新改敵一行見巾外曰敵敵等也中外如一之謂也亦作穀穀善也素一達禮不達樂曰素記曰達於禮而不達於樂謂之素達於樂而不逹於禮謂之偏勤一能脩其官曰勤謙一卑而不可踰曰謙友一睦於兄弟曰友新改舊法有孝而無友賀琛以友為朋友之友易之云耳震一治典不殺曰震治其典法雖不殺而人自震恐祁一治定不陂曰祁祁大也儆一衆方益平曰儆居安能戒此四方所以益平也攝一追補前過曰攝攝者能自檢攝也廣二美化及遠曰廣所聞能行曰廣大戴禮曰行其所聞則廣也淑一言行不回曰淑詩曰淑人君子其儀一兮革一獻敏成行曰革平一治而無眚曰平眚災也罪也治而無大咎耳非甚治也此非平正之平乃平常之平也周平王晉平公漢平帝以今觀之皆非取其平正則古人以平諡為平常之平耳惟晏平仲若取其平正者然人之情亦有不肯諡平正之人為平矣故不取懐二慈行短折曰懷失位而死曰懷新改古有晉懐公圉欒懐子盈楚懷王槐皆以失國而其民悲之故諡曰懷未有以能懷來而諡曰懷者則主人以懷諡為懷之思懷也悼三未中身夭曰悼肆行勞祀曰悼肆行不顧而勤於祭祀以求福神不顧享以至夭隕君子以其知欲避禍而不免為人所傷故曰悼恐懼徙處義同恐懼徙處曰悼劉熙曰遇災不能脩徳恐懼徙處以死故曰悼愍一在國逢難曰愍或作閔史記魯閔公宋愍公之類皆作湣義同哀二恭仁短折曰哀早孤短折曰哀哀亦悼爾然悼者悼其不幸而已哀者有所懷思深切之稱也故未中身夭曰悼恭仁短折曰哀早孤短折所以為哀者以其重不幸也懷義亦同隠三違拂不成曰𨼆劉熙曰若魯隠公讓志未究而為讒所拂違使不得成其美故曰隠不顯尸國曰隠懷情不盡曰隠易一好更故舊曰易懼一思愆深遠曰懼聲一不主其國曰聲强臣專國君權已去有君之名無君之實故曰聲息一謀慮不成曰息意欲為之而謀不成以止故曰息丁一述義不克曰丁丁當也述義而不克者適丁其時之不臧也紹一疎遠繼位曰紹劉熙曰此無它徳以世族當繼先祖之後者如漢立蕭何後之類也舒一舉事而遲曰舒冲一幼少短折曰冲野二質勝其文曰野孔子曰質勝文則野文勝質則史文質彬彬然後君子敬不中禮曰野儉一菲薄廢禮曰儉新改賀琛舊以儉為善諡夫儉而中禮則不曰儉矣惟儉而不中禮乃得為儉夸一華言無實曰夸攜一怠政外交曰攜躁二好變動民曰躁未及而動曰躁伐一剛克好勝曰伐靈三亂而不損曰靈好祭鬼神曰靈死而志成曰靈幽二壅遏不達曰幽君劣臣强壅遏上下不能自達故曰幽動静亂常曰幽厲二暴慢無禮曰厲愎狠遂過曰厲荒二縱樂無度曰荒昏亂紀度曰荒桀一賊人多殺曰桀紂一殘義損善曰紂煬三逆天虐民曰煬遠禮遠正曰煬好内怠政曰煬戾一不悔前過曰戾剌二暴慢無親曰剌妄愛曰剌劉熙曰不思賢人妄愛奸佞也愛一嗇於恩予曰愛虚一凉徳薄禮曰虚榮二寵禄光大曰榮先利後義曰榮蕩三好内遠禮曰蕩好智不好學曰蕩孔子曰好智不好學其蔽也蕩狂而無據曰蕩孔子曰古之狂也肆今之狂也蕩聞一色取仁而行違曰聞孔子云見達註墨一貪以敗官曰墨晉大夫叔向曰已惡而掠美為昏貪以敗官為墨殺人不忌曰賊僭二言行相違曰僭僭不信也舊法有作替者梁晉陵太守止黄侯蕭􅁮亦諡替其説亦曰言行相違盖僭之誤為替久矣言行違其義非替故正之自下陵上曰僭頃三墮覆社稷曰頃震動過懼曰頃劉熙曰頃惑之頃也若陳不占者也隂靖多謀曰頃舊法曰慈仁和敏曰頃其説曰民頃而就之也敏而敬慎曰頃已以事人也古未有善人而諡頃者晉頃公齊頃公皆不善人也則古以頃為惡諡耳亢二髙而無民曰亢知存而不知亡曰亢易乾上九文言曰貴而无位髙而无民賢人在下位而无輔又曰亢之為言也知進而不知退知存而不知亡知得而不知喪干一犯國之紀曰干褊一心隘不容曰褊專一違命自用曰專比一事君有黨曰比新改孔子曰君子周而不比小人比而不周非善諡也輕一薄徳弱志曰輕苛一煩酷傷民曰苛愿一弱無立志曰愿要一以勢致君曰要新改致讀曰善用兵者致人而不致於人之致潔一不汙不義曰潔讀作孟子所謂不屑不潔之潔此謂不以不義為汙者惡諡也沈潔法中惟有此而已後人誤以為清潔之潔而妄増之非也諡法卷四

body:
  text: 諡法政書類二儀制之屬提要臣等謹案諡法四卷宋蘇洵撰洵字明允眉山人官秘書省校書郎以霸州文安縣主簿修太常因革禮書成而卒事迹具宋史本傳自周公諡法以後厯代言諡者有劉熈來奥沈約賀琛王彦威蘇冕扈䝉之書然皆雜糅附益不為典要至洵奉詔編定六家諡法乃取周公春秋廣諡及諸家之本刪訂考證以成是書凡所取一百六十八諡三百十一條新改者二十三條新補者十七條别有七去八類於舊文所有者刋削甚多其間如堯舜禹湯桀紂乃古帝王之名並非諡號而沿襲前訛㮣行載入亦不免疎失然較之諸家義例要為嚴整後鄭樵通志諡略大都因此書而増補之且稱其斷然有所去取善惡有一定之論實前人所不及葢其斟酌損益審定字義皆確有根據故為禮家所宗雖其中間收僻字今或不能盡見諸施行而厯代相傳之舊典猶可以備參考焉曽鞏作洵墓誌載此書作三卷而此本實四卷殆後人所分析歟乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c8119582685e0379337d74be4a5c7844ccefab03b13defc79492e6b5e6d9802f

front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0022_WYG_002-1a, image: WYG0646/WYG0646-0903c.png}
body:
  text: 諡法卷二宋蘇洵撰正一内外賔服曰正正不正之相去甚遠然不正之人無有肯自服其正之者如此則邪正終不可辨也故舉其効曰惟衆人之所同服者正也天下之議惟衆為最公茍其不正雖有服者不能服内外敬六畏天愛民曰敬齊莊中正曰敬夙夜就事曰敬受命不遷曰敬死不忘君曰敬陳善閉邪曰敬孟子曰責難於君謂之恭陳善閉邪謂之敬吾君不能謂之賊恭五卑以自牧曰恭新補恭之所以異於敬者恭為謙恭敬為恭敬也舊法不知辨故特著之不懈為徳曰恭治典不易曰恭責難於君曰恭孟子云見敬注旣過能改曰恭楚子審將卒召大夫而告之請諡為靈若厲以其常喪師于鄢也及卒謀諡大夫曰君有命矣子囊曰君命以恭若之何毁之赫赫楚國而君臨之撫有蠻夷奄征南海以屬諸夏而知其過可不謂恭乎請諡之大夫從之故後世因以旣過能改曰恭莊三嚴敬臨民曰莊威而不猛曰莊履正志和曰莊肅三剛徳克就曰肅劉熙曰以剛禦下人畏而明令故肅執心决斷曰肅正已攝下曰肅穆三布徳執義曰穆劉熙曰穆和也徳義人道之貴能布行之以此致雍和之化故曰穆中情見貌曰穆詩曰穆穆文王於緝熙敬止又曰穆穆魯侯敬明其徳夫惟有於内而見於外而後可以為穆也戴二典禮不愆曰戴劉熙以為戴者為民所瞻仰也典禮不愆此詩謂其容不改出言有章者也愛民好治曰戴翼一思慮深遠曰翼詩曰小心翼翼思慮深遠之謂也襄二闢土有徳曰襄劉熙曰襄除也除殄四方夷狄得其土地故曰襄因事有功曰襄烈二安民有功曰烈秉徳遵業曰烈桓一克亟成功曰桓新改舊法曰克亟動民曰桓武定四方曰桓克亟動民行惡諡也武定四方行善諡也桓者剛勇亟切不害之稱也不可遂為惡亦不可遂許其善故合之曰克亟成功曰桓齊桓用管仲刑名之術以伯天下而諡為桓則克亟成功之故歟威三賞勸刑怒曰威新補以刑服遠曰威強毅執正曰威勇一率義共用曰勇晉狼曋為右先軫黜之狼曋怒其友曰盍死之吾與汝為難曋曰周志有之勇則害上不登於明堂共用之謂勇吾以勇為右死而不義非勇也強五和而不流曰强中立不倚曰强守道不變曰强記曰和而不流強哉矯中立而不倚強哉矯國有道不變塞焉強哉矯國無道至死不變強哉矯死不遷情曰强晉太子申生之奔新城其傅杜原欵謂之曰死不遷情强也守情説父孝也殺身以成志仁也死不忘君恭也申生乃死自勝其心曰强新補老子曰勝人者有力自勝者强毅二致果殺敵曰毅强而能斷曰毅剛一強毅果敢曰剛克二秉義行剛曰克語稱克伐怨欲則克者好勝人之謂也然書有剛克柔克則克亦能也舊法如此故從之愛民作刑曰克壯二勝敵克亂曰壯武而不遂曰壯劉熙曰志存節義事有窘廹功不得成者也春秋原心故諡曰壯果一好力致勇曰果圉一威徳剛武曰圉或作禦魏一克威捷行曰魏能威而速民所不能測視之巍巍然髙且大也故曰魏安二好和不争曰安兆民寧賴曰安定五安民大慮曰定劉熙曰大慮其害而為之防以安之故曰定安民法古曰定大慮慈民曰定劉熙曰不争小利務在養全以安定之故曰定絶行不爽曰定追補前過曰定過而能改君子以其過為誤而以其能改為出於性也性固定矣故從其性謂之定以為此乃其人之實也簡四治典不殺曰簡治其典法使民不犯以至不殺簡之至也正直無邪曰簡正直無邪則事自簡故記曰直道必簡一徳不懈曰簡平易不訾曰簡劉熙以為君能平易不信訾毁使民易知則治亦自簡貞三固節幹事曰貞易曰貞固足以幹事圖國忘死曰貞清白守節曰貞節二好㢘自克曰節謹行節度曰節白二内外貞復曰白貞復謂反覆皆正也湼而不緇曰白匡二貞心大度曰匡以法正國曰匡質二名實不爽曰質中正無邪曰質靖二寛樂令終曰靖恭仁鮮言曰靖舊有作静及靚靖者竝同真二肇敏行成曰真真誠也始肇之則敏終行之則成此誠能之者也故曰真肇之敏而行之不成斯偽矣不隠無屏曰真諸家皆云不隠無屏曰貞於義不通世有書號師春者載古諡法百餘字與諸家名同其一曰不隠無藏曰真於義為允故取之真與貞相近自誤爾順二慈和徧服曰順和比於理曰順商一昭功寧民曰商商商度也度有功者而賞之以寧民也劉熙以為漢髙帝誅丁公而賞雍齒即其事理或然歟原一思慮不爽曰原思慮根於中如泉源也夷一安民好靖曰夷思三追悔前過曰思謀慮不僭曰思念終如始曰思考一大慮方行曰考考稽也稽考其事而後行之則成故曰考胡二保民畏慎曰胡胡老也與民相保終老畏慎故曰胡稱年夀考曰胡此夀考而人安樂之者也人樂其夀故從其夀而諡之曰胡暠一綜善典法曰暠暠明也使一治民克盡曰使此能盡民力者也顯一行見中外曰顯和四柔遠能邇曰和號令悦民曰和不剛不柔曰和推賢讓能曰和𤣥一含和無欲曰𤣥髙一徳覆萬物曰髙光三功格上下曰光能紹前業曰光居上能謙曰光新改易曰謙尊而光卑而不可踰大一則天法堯曰大諡法卷二

body:
  text: 諡法卷一宋蘇洵撰神一聖不可知曰神新改孟子曰可欲之謂善有諸已之謂信充實之謂美充實而有光輝之謂大大而化之之謂聖聖而不可知之謂神舊法諸説雖多而不出於此故取之聖二行道化民曰聖新補窮理盡性曰聖夫堯不能窮理盡性安能行道古之所謂行道者堯舜而已如孔子則窮理盡性而道不行者也故兩著焉且聖者大名也而舊法以敬祀享禮揚善賊謀通達先知當之不足於聖故皆不取賢一行義合道曰賢新改賢者賢於人之謂也故不可以一行當之惟其行事舉合於道而後可以為賢也茍以一行當賢行賢者不可勝舉矣凡舊法智而好謀彰善掩過之類皆歸之他諡而不以賢命之堯一大而難名曰堯新改舊法翼善傳聖曰堯有子可傳而時無舜則堯不得為堯矣此因已然之迹而論堯者不可用孔子曰惟天為大惟堯則之蕩蕩乎民無能名焉民不知所以名堯而徒見其堯堯然者故曰堯舜一仁聖盛明曰舜舜充也記曰舜好問而好察邇言隱惡而揚善執其兩端用其中於民鄭康成曰舜之言充也蓋言取天下之善以充諸其身云爾禹二淵原通流曰禹受禪成功曰禹此二者皆因禹之功以為義也湯二雲行雨施曰湯除殘去虐曰湯湯者湔濯天下殘毒之稱也文八施而中理曰文新補舊法曰施為文除為武文者文理之謂也施而不中理由未得為文也蓋文之為義廣古之文王乃得當之惟其施而無不中理云耳下而至於孔文子公叔文子仲尼皆以文許之是一節中理者也故觀其諡而考其所以諡而文之大小乃見蓋行之中理而可以為文者其實不可勝廣也故取舊法之所謂文而不害於義者著之而後世之君子茍有施而中於理者皆可以文諡之雖法之所不及可也經緯天地曰文國語單子曰經之以天緯之以地經緯不爽文之象也晉大夫亦云見明注敏而好學曰文語云孔文子何以謂之文也孔子曰敏而好學不耻下問是以謂之文也修德來遠曰文孔子曰遠人不服則修文德以來之忠信接禮曰文劉熙以為本之以忠信繼之以禮樂斯為文矣道德博聞曰文博聞而無德固不得為文有道德而聞不博亦徒可以為德而未可以為文也惟道德博聞而後文剛柔相濟曰文新改舊法曰寬而不慢廉而不劌曰文又曰寬立不慢堅強不暴曰文能剛柔相濟之謂也修治班制曰文衛公孫枝卒其子戌請諡于君君曰昔者衛國凶飢夫子為粥與國之餓者是不亦惠乎昔者衛國有難夫子以其死衛寡人不亦貞乎夫子聽衛國之政修其班制以與四鄰交衛國之社稷不辱不亦文乎故謂夫子貞惠文子武六克定禍亂曰武保大定功曰武既以武克敵又能保有其大安定其功此武之大成也左傳楚莊王為武者有七德此其二也威強睿德曰武劉熙曰睿智也威而強果加之以謀故曰武剛強以順曰武新改舊法剛強理直曰武師衆以順曰武並之以此闢土斥境曰武折衝禦侮曰武成五禮樂明具曰成新補刑名克服曰成劉熙以為以法加民而民服治德以成故曰成持盈守滿曰成詩序言曰鳬鷖守成也言太平之君子能持盈守成謂成王也遂物之美曰成通達強立曰成康二撫民安樂曰康溫良好樂曰康溫良愷悌不擇所處安之故曰康獻二聰明睿智曰獻獻賢也嚮德內德曰獻今文尚書云爾注家皆云嚮惠德元其義不當通以書為信劉熙以為獻者軒軒然在物上之稱也內亦嚮也人能日嚮於德惠則為衆所推仰軒軒然在上矣懿一柔克有光曰懿今文尚書曰柔克曰懿剛克曰伐元三體仁長民曰元新補易曰元者善之長也君子體仁足以長人始建國都曰元劉熙曰此元首之元也思能辨衆曰元思慮能辨衆之所疑是識其要也曰元章三法度明大曰章敬慎髙亢曰章出言有文曰章釐二質淵受諫曰釐小心畏忌曰釐釐福也樂也廣也其質如淵虛以受諫與小心畏忌二者皆深自抑損以求無過者此所以受福也或作僖以急並同景二耆意大圖曰景布義行剛曰景今文尚書曰景武之力也又曰猶義而濟曰景宣三施而不私曰宣施止其所私則不廣不廣非宣矣善聞周達曰宣誠意見外曰宣新補明七照臨四方曰明詩云維此王季帝度其心貊其德音其德克明克明克類克長克君王此大邦克順克比比于文王其德靡悔晉大夫成鱄曰心能制義曰度德正應和曰莫照臨四方曰明勤施無私曰類教誨不倦曰長慶賞刑威曰君慈和遍服曰順擇善而從之曰比經緯天地曰文此即所謂九德者也任賢致遠曰明總集殊異曰明與我異者能不疑而總集之非明者不能也獨見先識曰明譖訴不行曰明子張問明子曰浸潤之譖膚受之訴不行焉可謂明也已矣浸潤之譖膚受之訴不行焉可謂遠也已矣能揚仄陋曰明察色見情曰明新補昭二明德有功曰昭劉熙為能明明德而任之則有功而昭顯聖聞周達曰昭諡法卷一
